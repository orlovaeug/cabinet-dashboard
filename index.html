<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kabinetsmonitor — Nederland</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0d0f14;
    --surface:  #161921;
    --border:   #252932;
    --muted:    #3a404d;
    --text:     #e8eaf0;
    --subtext:  #8892a4;
    --accent:   #ae8f5c;
    --accent2:  #c4a96d;
    --nl-red:   #c1272d;
    --nl-blue:  #003580;
    --pvv:      #003580;
    --vvd:      #e17000;
    --nsc:      #0a4f8a;
    --bbb:      #275937;
    --ind:      #555e6c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-flag {
    display: flex;
    flex-direction: column;
    width: 28px;
    height: 19px;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .logo-flag span { flex: 1; display: block; }
  .logo-flag span:nth-child(1) { background: #ae1c28; }
  .logo-flag span:nth-child(2) { background: #fff; }
  .logo-flag span:nth-child(3) { background: #21468b; }

  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .site-title span { color: var(--accent); }

  .header-meta {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--subtext);
    text-align: right;
    line-height: 1.6;
  }

  nav {
    display: flex;
    gap: 0;
    margin-left: 2rem;
  }

  nav button {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--subtext);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 1rem;
    height: 64px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  nav button:hover { color: var(--text); }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Layout ── */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
  }

  .section { display: none; }
  .section.visible { display: block; }

  /* ── Section headers ── */
  .section-header {
    margin-bottom: 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  .section-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
  }

  .section-header .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--subtext);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
  }

  /* ── ACTIVITY SECTION ── */
  .activity-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .minister-card {
    background: var(--surface);
    padding: 1.25rem;
    position: relative;
    transition: background 0.15s;
  }

  .minister-card:hover { background: #1d2230; }

  .minister-card .party-bar {
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
  }

  .minister-card .status-dot {
    position: absolute;
    top: 1.1rem; right: 1.1rem;
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .status-dot.active  { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
  .status-dot.quiet   { background: #facc15; }
  .status-dot.silent  { background: var(--muted); }

  .minister-card .ministry-name {
    font-size: 0.7rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--subtext);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.35rem;
    margin-left: 0.75rem;
  }

  .minister-card .minister-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-left: 0.75rem;
    margin-bottom: 0.8rem;
  }

  .card-stats {
    display: flex;
    gap: 1rem;
    margin-left: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .stat-block { }
  .stat-block .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
  }
  .stat-block .stat-label {
    font-size: 0.62rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--subtext);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .activity-bar-outer {
    background: var(--muted);
    height: 3px;
    border-radius: 2px;
    margin: 0.5rem 0.75rem 0.5rem 0.75rem;
    overflow: hidden;
  }
  .activity-bar-inner {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.6s ease;
  }

  .card-footer {
    margin-left: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .party-pill {
    font-size: 0.6rem;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    font-weight: 600;
  }

  .last-pub {
    font-size: 0.62rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--subtext);
  }

  /* ── PARTIES SECTION ── */
  .party-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .party-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .party-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .party-card .party-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 900;
    margin-bottom: 0.25rem;
  }

  .party-card .party-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--subtext);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }

  .party-card .big-num {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .party-card .big-num-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--subtext);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }

  .party-ministers {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }

  .party-minister-tag {
    font-size: 0.68rem;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    color: var(--subtext);
  }

  /* ── TOPICS SECTION ── */
  .topics-cloud {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2.5rem;
    min-height: 320px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 2rem;
  }

  .topic-word {
    cursor: pointer;
    line-height: 1.2;
    font-weight: 400;
    transition: color 0.2s, transform 0.15s;
    color: var(--subtext);
  }
  .topic-word:hover { transform: translateY(-2px); }
  .topic-word.highlight { color: var(--accent2) !important; }

  /* ── FEED SECTION ── */
  .feed-controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    padding: 0.55rem 1rem;
    border-radius: 6px;
    outline: none;
    flex: 1;
    min-width: 200px;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    padding: 0.55rem 0.85rem;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }
  .filter-select:focus { border-color: var(--accent); }

  .feed-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--subtext);
    margin-left: auto;
  }

  .feed-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }

  .feed-item {
    background: var(--surface);
    padding: 1.1rem 1.25rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.85rem;
    align-items: start;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .feed-item:hover { background: #1d2230; }

  .feed-item .feed-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--subtext);
    white-space: nowrap;
    padding-top: 0.2rem;
    width: 72px;
    text-align: right;
  }

  .feed-item .feed-body {}

  .feed-item .feed-title {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    margin-bottom: 0.25rem;
  }

  .feed-item .feed-meta {
    font-size: 0.7rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--subtext);
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .feed-item .feed-intro {
    font-size: 0.8rem;
    color: var(--subtext);
    line-height: 1.5;
    margin-top: 0.3rem;
  }

  .feed-item .feed-arrow {
    color: var(--muted);
    font-size: 0.9rem;
    padding-top: 0.15rem;
    transition: color 0.15s, transform 0.15s;
  }
  .feed-item:hover .feed-arrow { color: var(--accent); transform: translateX(3px); }

  .source-tag {
    font-size: 0.55rem;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.1rem 0.35rem;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── Loading / Error ── */
  .loading-state, .error-state {
    text-align: center;
    padding: 6rem 2rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--subtext);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 0 1rem; gap: 0.75rem; }
    nav button { padding: 0 0.6rem; font-size: 0.65rem; }
    main { padding: 1rem; }
    .activity-grid { grid-template-columns: 1fr; }
    .feed-item { grid-template-columns: 1fr; }
    .feed-item .feed-date { text-align: left; width: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-flag"><span></span><span></span><span></span></div>
  <div class="site-title">Kabinets<span>monitor</span></div>
  <nav>
    <button class="active" onclick="showSection('activity')">Activiteit</button>
    <button onclick="showSection('parties')">Coalitie</button>
    <button onclick="showSection('topics')">Trending</button>
    <button onclick="showSection('feed')">Persberichten</button>
  </nav>
  <div class="header-meta" id="header-meta">laden…</div>
</header>

<main>
  <!-- ACTIVITY -->
  <section id="section-activity" class="section visible">
    <div class="section-header">
      <h2>Minister Activiteit</h2>
      <span class="badge">Afgelopen 30 dagen</span>
    </div>
    <div id="activity-container"><div class="loading-state"><div class="spinner"></div>Data ophalen…</div></div>
  </section>

  <!-- PARTIES -->
  <section id="section-parties" class="section">
    <div class="section-header">
      <h2>Coalitie Breakdown</h2>
      <span class="badge">PVV · VVD · NSC · BBB</span>
    </div>
    <div id="parties-container"><div class="loading-state"><div class="spinner"></div></div></div>
  </section>

  <!-- TOPICS -->
  <section id="section-topics" class="section">
    <div class="section-header">
      <h2>Trending Onderwerpen</h2>
      <span class="badge">Frequentie analyse</span>
    </div>
    <div id="topics-container"><div class="loading-state"><div class="spinner"></div></div></div>
  </section>

  <!-- FEED -->
  <section id="section-feed" class="section">
    <div class="section-header">
      <h2>Persberichten</h2>
      <span class="badge">Live feed</span>
    </div>
    <div class="feed-controls">
      <input class="search-box" id="search-input" type="text" placeholder="Zoek persberichten…" oninput="filterFeed()"/>
      <select class="filter-select" id="ministry-filter" onchange="filterFeed()">
        <option value="">Alle ministeries</option>
      </select>
      <select class="filter-select" id="party-filter" onchange="filterFeed()">
        <option value="">Alle partijen</option>
        <option value="PVV">PVV</option>
        <option value="VVD">VVD</option>
        <option value="NSC">NSC</option>
        <option value="BBB">BBB</option>
        <option value="Independent">Independent</option>
      </select>
      <span class="feed-count" id="feed-count"></span>
    </div>
    <div id="feed-container"><div class="loading-state"><div class="spinner"></div></div></div>
  </section>
</main>

<script>
let DATA = null;

// ── Navigation ────────────────────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('visible');
  event.currentTarget.classList.add('active');
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('data/dashboard.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    render();
  } catch (e) {
    document.querySelectorAll('.loading-state').forEach(el => {
      el.innerHTML = `<div class="error-state">⚠️ Kon data niet laden.<br><br>
        Zorg dat <code>backend/fetch_data.py</code> is uitgevoerd<br>en dat <code>frontend/data/dashboard.json</code> bestaat.<br><br>
        <small style="color:var(--muted)">${e.message}</small></div>`;
    });
  }
}

// ── Format date ───────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '–';
  const d = new Date(iso);
  return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric' });
}

function daysAgo(iso) {
  if (!iso) return '';
  const diff = Math.round((Date.now() - new Date(iso)) / 86400000);
  if (diff === 0) return 'vandaag';
  if (diff === 1) return 'gisteren';
  return diff + 'd geleden';
}

// ── Render all sections ────────────────────────────────────────────────────────
function render() {
  const gen = new Date(DATA.generated_at);
  document.getElementById('header-meta').innerHTML =
    `Bijgewerkt: ${gen.toLocaleDateString('nl-NL', {day:'numeric',month:'short'})} ${gen.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}<br>${DATA.activity.length} ministeries · ${DATA.feed.length} berichten`;

  renderActivity();
  renderParties();
  renderTopics();
  renderFeed();
}

// ── Activity grid ─────────────────────────────────────────────────────────────
function renderActivity() {
  const max = Math.max(...DATA.activity.map(a => a.count_30d), 1);
  const html = DATA.activity.map(a => `
    <div class="minister-card">
      <div class="party-bar" style="background:${a.party_color}"></div>
      <div class="status-dot ${a.status}" title="${a.status}"></div>
      <div class="ministry-name">${a.ministry}</div>
      <div class="minister-name">${a.minister}</div>
      <div class="card-stats">
        <div class="stat-block">
          <div class="stat-num">${a.count_30d}</div>
          <div class="stat-label">30 dagen</div>
        </div>
        <div class="stat-block">
          <div class="stat-num">${a.count_7d}</div>
          <div class="stat-label">7 dagen</div>
        </div>
      </div>
      <div class="activity-bar-outer">
        <div class="activity-bar-inner" style="width:${Math.round(a.count_30d/max*100)}%;background:${a.party_color}"></div>
      </div>
      <div class="card-footer">
        <span class="party-pill" style="background:${a.party_color}22;color:${a.party_color};border:1px solid ${a.party_color}44">${a.party}</span>
        <span class="last-pub">${a.last_publication ? daysAgo(a.last_publication) : 'geen data'}</span>
      </div>
    </div>
  `).join('');
  document.getElementById('activity-container').innerHTML =
    `<div class="activity-grid">${html}</div>`;
}

// ── Parties ───────────────────────────────────────────────────────────────────
function renderParties() {
  const totalMax = Math.max(...DATA.parties.map(p => p.total_30d), 1);
  const html = DATA.parties.map(p => `
    <div class="party-card">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${p.color}"></div>
      <div class="party-name" style="color:${p.color}">${p.party}</div>
      <div class="party-count">${p.ministers.length} minister${p.ministers.length !== 1 ? 's' : ''}</div>
      <div class="big-num" style="color:${p.color}">${p.total_30d}</div>
      <div class="big-num-label">persberichten (30d)</div>
      <div class="activity-bar-outer" style="margin:0 0 1rem 0">
        <div class="activity-bar-inner" style="width:${Math.round(p.total_30d/totalMax*100)}%;background:${p.color}"></div>
      </div>
      <div class="party-ministers">
        ${p.ministers.map(m => `<span class="party-minister-tag">${m}</span>`).join('')}
      </div>
    </div>
  `).join('');
  document.getElementById('parties-container').innerHTML =
    `<div class="party-grid">${html}</div>`;
}

// ── Topics cloud ──────────────────────────────────────────────────────────────
function renderTopics() {
  const maxCount = Math.max(...DATA.topics.map(t => t.count), 1);
  const minCount = Math.min(...DATA.topics.map(t => t.count), 1);
  const html = DATA.topics.map(t => {
    const ratio = (t.count - minCount) / (maxCount - minCount + 1);
    const size  = 0.8 + ratio * 2.2;
    const alpha = 0.35 + ratio * 0.65;
    return `<span class="topic-word" style="font-size:${size.toFixed(2)}rem;color:rgba(168,143,92,${alpha.toFixed(2)})"
      title="${t.word}: ${t.count}×" onclick="topicClick(this,'${t.word}')">${t.word}</span>`;
  }).join(' ');

  document.getElementById('topics-container').innerHTML = `
    <div class="topics-cloud">${html}</div>`;
}

function topicClick(el, word) {
  document.querySelectorAll('.topic-word').forEach(w => w.classList.remove('highlight'));
  el.classList.add('highlight');
  // Switch to feed and filter
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('section-feed').classList.add('visible');
  document.querySelectorAll('nav button')[3].classList.add('active');
  document.getElementById('search-input').value = word;
  filterFeed();
}

// ── Feed ──────────────────────────────────────────────────────────────────────
function renderFeed() {
  // Populate ministry dropdown
  const ministries = [...new Set(DATA.feed.map(f => f.ministry))].sort();
  const sel = document.getElementById('ministry-filter');
  ministries.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
  filterFeed();
}

function filterFeed() {
  const q     = (document.getElementById('search-input').value || '').toLowerCase();
  const min   = document.getElementById('ministry-filter').value;
  const party = document.getElementById('party-filter').value;

  const items = DATA.feed.filter(f => {
    if (min   && f.ministry !== min)                   return false;
    if (party && f.party    !== party)                 return false;
    if (q && !f.title.toLowerCase().includes(q) &&
             !f.intro.toLowerCase().includes(q) &&
             !f.minister.toLowerCase().includes(q))    return false;
    return true;
  });

  document.getElementById('feed-count').textContent = `${items.length} berichten`;

  const html = items.map(f => `
    <a class="feed-item" href="${f.url}" target="_blank" rel="noopener">
      <div class="feed-date">${fmtDate(f.date_ts)}</div>
      <div class="feed-body">
        <div class="feed-title">${f.title}</div>
        <div class="feed-meta">
          <span style="color:${f.party_color}">${f.minister}</span>
          <span>·</span>
          <span>${f.ministry}</span>
          <span class="source-tag">${f.source}</span>
        </div>
        ${f.intro ? `<div class="feed-intro">${f.intro}</div>` : ''}
      </div>
      <div class="feed-arrow">→</div>
    </a>
  `).join('') || '<div class="loading-state">Geen resultaten gevonden.</div>';

  document.getElementById('feed-container').innerHTML =
    `<div class="feed-list">${html}</div>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
